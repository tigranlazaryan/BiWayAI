<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiWay AI — Твой путь в бизнес</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body style="margin: 0; padding: 0; background: #0f0f13; font-family: sans-serif;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const API_URL = "https://my-backend-production-05d4.up.railway.app";
        const STEPS = ["idea", "budget", "details", "generating", "result"];
        const currencies = ["USD", "AMD", "RUB", "EUR"];
        
        const sectionIcons = {
            "Суть бизнеса": "💡", "Анализ рынка": "📊", "Первые шаги": "🚀",
            "Бюджет и расходы": "💰", "Как привлечь клиентов": "📣",
            "Риски и как их избежать": "⚠️", "Прогноз дохода": "📈", "Итог": "✅"
        };

        function BizPlanApp() {
            const [step, setStep] = useState(0);
            const [idea, setIdea] = useState("");
            const [budget, setBudget] = useState("");
            const [currency, setCurrency] = useState("USD");
            const [experience, setExperience] = useState("");
            const [location, setLocation] = useState("Армения");
            const [plan, setPlan] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            async function generatePlan() {
                setLoading(true);
                setError("");
                setStep(3);
                try {
                    const response = await fetch(`${API_URL}/api/generate`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ businessIdea: idea, budget: `${budget} ${currency}`, location, experience: experience || "не указан", contacts: "BiWay AI" })
                    });
                    const data = await response.json();
                    if (response.ok && data.success) {
                        const parsed = JSON.parse(data.data.replace(/```json|```/g, "").trim());
                        setPlan(parsed);
                        setStep(4);
                    } else { throw new Error("Ошибка сервера"); }
                } catch (err) {
                    setError("Ошибка генерации. Попробуй ещё раз.");
                    setStep(2);
                } finally { setLoading(false); }
            }

            return (
                <div style={{ minHeight: "100vh", background: "#0f0f13", color: "#e8e6e1", display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 16px" }}>
                    <div style={{ width: "100%", maxWidth: 680, textAlign: "center", marginBottom: 40 }}>
                        <h1 style={{ fontSize: 32, fontWeight: 700, margin: 0, color: "#8b5cf6" }}>BiWay AI</h1>
                        <p style={{ color: "#8b8ba8" }}>Твой путь в бизнес</p>
                    </div>
                    <div style={{ width: "100%", maxWidth: 680 }}>
                        {step === 0 && (
                            <div>
                                <textarea placeholder="Твоя идея..." rows={5} style={{ width: "100%", padding: "16px", borderRadius: 12, background: "#16161f", color: "#fff", border: "1px solid #2a2a3a" }} onChange={(e) => setIdea(e.target.value)} />
                                <button style={{ marginTop: 20, width: "100%", padding: "16px", borderRadius: 12, background: "#8b5cf6", border: "none", color: "#fff" }} onClick={() => setStep(1)}>Далее</button>
                            </div>
                        )}
                        {step === 1 && (
                            <div>
                                <input type="number" placeholder="Бюджет" style={{ width: "100%", padding: "16px", borderRadius: 12, background: "#16161f", color: "#fff", border: "1px solid #2a2a3a" }} onChange={(e) => setBudget(e.target.value)} />
                                <button style={{ marginTop: 20, width: "100%", padding: "16px", borderRadius: 12, background: "#8b5cf6", border: "none", color: "#fff" }} onClick={() => setStep(2)}>Далее</button>
                            </div>
                        )}
                        {step === 2 && (
                            <button style={{ width: "100%", padding: "16px", borderRadius: 12, background: "#6d28d9", color: "#fff", border: "none" }} onClick={generatePlan}>Сгенерировать план</button>
                        )}
                        {step === 3 && <div style={{ textAlign: "center", color: "#8b8ba8" }}>Генерируем...</div>}
                        {step === 4 && plan && (
                            <div style={{ color: "#e8e6e1" }}>
                                <h2>{plan.title}</h2>
                                {plan.sections?.map((s, i) => <div key={i}><h3>{sectionIcons[s.title]} {s.title}</h3><p>{s.content}</p></div>)}
                                <button style={{ width: "100%", padding: "16px", borderRadius: 12, background: "#2a2a3a", color: "#fff", border: "none" }} onClick={() => setStep(0)}>Новый план</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BizPlanApp />);
    </script>
</body>
</html>
